<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>X Archived</title>

    <meta name="robots" content="noindex,nofollow">
    <meta name="color-scheme" content="light dark">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #ffffff;
            color: #222;
            font-family: system-ui, -apple-system, sans-serif;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid #e5e5e5;
        }


        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .board {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
            gap: 32px;
            justify-items: center;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 230px;
            display: block;
            text-decoration: none;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid #2a2a2a;
            transition: .2s;
            filter: grayscale(35%);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }

        .card:hover img {
            transform: scale(1.04);
            border-color: #ff4d4d;
            filter: none;
        }

        .overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 36%;
            padding: 18px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;

            background: linear-gradient(
                    rgba(0, 0, 0, 0) 0%,
                    rgba(0, 0, 0, 0.65) 40%,
                    rgba(0, 0, 0, 0.95) 100%
            );

            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .username {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: .4px;
            color: #fff;
            text-shadow: 0 3px 8px rgba(0, 0, 0, .8);
        }

        .icon {
            font-size: 20px;
            opacity: .8;
            transition: .18s;
        }

        .card:hover .icon {
            opacity: 1;
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 12px;
            color: #777;
        }

        .disclaimer {
            max-width: 900px;
            margin: 20px auto 0;
            font-size: 12px;
            line-height: 1.5;
            color: #888;
            text-align: center;
        }

        .section-title {
            font-size: 26px;
            font-weight: 800;
            margin: 12px 0 10px;
            letter-spacing: 0.4px;
            color: #222;
        }

        .section-title span {
            font-weight: 500;
            color: #9a9a9a;
            font-size: 0.82em;
            margin-left: 6px;
        }

        .card {
            cursor: pointer;
        }

        .home-button {
            position: fixed;
            top: 40px;
            right: 40px;

            font-size: 13px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #57606a;
            text-decoration: none;
            font-weight: 600;

            transition: background 0.15s, transform 0.05s;
        }

        .home-button:hover {
            background: #eef1f4;
            text-decoration: underline;
        }

        .home-button:active {
            transform: translateY(1px);
        }


        /* Dark mode */
        @media (prefers-color-scheme: dark) {

            body {
                background: #0f0f10;
                color: #eaeaea;
            }

            header {
                border-bottom: 1px solid #222;
            }

            .section-title {
                color: #eee;
            }

            .section-title span {
                color: #aaa;
            }

            .home-button {
                background: #1f2428;
                border-color: #30363d;
                color: #c9d1d9;
            }

            .home-button:hover {
                background: #24292f;
            }
        }

        /* 모바일 */

        @media (max-width: 700px) {

            .grid {
                gap: 22px;
            }

            .username {
                font-size: 18px;
            }

            .overlay {
                padding: 14px;
            }
        }
    </style>
</head>
