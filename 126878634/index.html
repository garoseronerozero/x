<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow">
    <title>@Happipupper</title>
    <link rel="icon" href="../favicon.ico">
    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
            background: #f3f4f6;
            margin: 0;
            padding: 50px 20px;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .tweet {
            background: #ffffff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 32px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
        }

        .link {
            margin-bottom: 14px;
        }

        .link a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: #1d9bf0;
        }

        .link a:hover {
            text-decoration: underline;
        }

        iframe {
            width: 100%;
            height: 780px;
            border: none;
            border-radius: 8px;
        }

        .title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #downloadAll {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: .7;
        }

        #downloadAll:hover {
            opacity: 1;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>@Happipupper Archived Tweets (<span id="tweet-count"></span>)</h1>
        <button id="downloadAll" title="Download">⬇</button>
    </div>

    <div class="tweet">
        <div class="link">
            <a href="https://x.com/Happipupper/status/1904039868633923775" target="_blank">
                Original Tweet →
            </a>
        </div>
        <iframe src="1904039868633923775_126878634.pdf#toolbar=0&navpanes=0"></iframe>
    </div>

    <div class="tweet">
        <div class="link">
            <a href="https://x.com/Happipupper/status/2027934857834491951" target="_blank">
                Original Tweet →
            </a>
        </div>
        <iframe src="2027934857834491951_126878634.pdf#toolbar=0&navpanes=0"></iframe>
    </div>

    <div class="tweet">
        <div class="link">
            <a href="https://x.com/Happipupper/status/2028728552477302793" target="_blank">
                Original Tweet →
            </a>
        </div>
        <iframe src="2028728552477302793_126878634.pdf#toolbar=0&navpanes=0"></iframe>
    </div>

    <div class="tweet">
        <div class="link">
            <a href="https://x.com/Happipupper/status/2028732629236027816" target="_blank">
                Original Tweet →
            </a>
        </div>
        <iframe src="2028732629236027816_126878634.pdf#toolbar=0&navpanes=0"></iframe>
    </div>

    <div class="tweet">
        <div class="link">
            <a href="https://x.com/Happipupper/status/2029019940074991771" target="_blank">
                Original Tweet →
            </a>
        </div>
        <iframe src="2029019940074991771_126878634.pdf#toolbar=0&navpanes=0"></iframe>
    </div>

    <script>
        const count = document.querySelectorAll('.tweet').length;
        document.getElementById('tweet-count').textContent = count;
    </script>
    <script>
        document.getElementById("downloadAll").onclick = () => {
            document.querySelectorAll(".tweet iframe").forEach((f,i)=>{
                const url = f.src.split("#")[0];
                const a = document.createElement("a");
                a.href = url;
                a.download = "";

                document.body.appendChild(a);

                setTimeout(()=>{
                    a.click();
                    a.remove();
                }, i*150);
            });
        };
    </script>

</div>

</body>
</html>
