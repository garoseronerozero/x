<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <title>𝕏 Archive</title>

    <link rel="icon" href="../favicon.ico">
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex,nofollow">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .header {
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            line-height: 1.4;
        }


        h1 .sub {
            display: block;
            margin-top: 8px;
            opacity: 0.75;
            font-size: 14px;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            opacity: 0.95;
            /*text-shadow: 0 0 6px rgba(255, 209, 102, 0.4);*/
        }

        .nav {
            display:flex;
            gap:8px;
        }

        .nav a {
            font-size: 13px;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #57606a;
            text-decoration: none;
            font-weight: 600;
        }

        .nav a:hover {
            background: #eef1f4;
        }

        /* 설명 */
        .description {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        .quicklinks {
            margin-bottom: 30px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .quicklinks a {
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 8px;
            background: #f3f6fb;
            border: 1px solid #e2e6ee;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .quicklinks a:hover {
            background: #e9f1ff;
        }

        .grid {
            column-count: 2;
            column-gap: 18px;
        }

        .card {
            break-inside: avoid;
            margin-bottom: 18px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            background: #fff;
            overflow: hidden;
        }

        /* embed 안정화 */
        .card iframe {
            width: 100% !important;
        }


        .disclaimer {
            margin-top: 40px;
            padding-top: 16px;

            /*border-top: 1px solid #eaeef2;*/

            font-size: 12px;
            color: #8b949e;

            text-align: center;
        }

        /* 모바일 */
        @media (max-width: 700px) {

            h1 {
                font-size: 22px;
            }

            h1 .sub {
                font-size: 14px;
            }

            .grid {
                column-count: unset;   /* column 끄기 */
                display: grid;
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .card {
                break-inside: unset;   /* 안전하게 제거 */
            }
        }

        /* 다크모드 */
        @media (prefers-color-scheme: dark) {

            h1 .sub {
                opacity: 0.85;
                color: #e6edf3;

                text-shadow:
                        0 0 6px rgba(255,255,255,0.15),
                        0 0 12px rgba(255,255,255,0.08);
            }

            /*h1 em {*/
            /*    color: #ffd166;*/
            /*}*/

            body {
                background: #0d1117;
                color: #e6edf3;
            }

            .card {
                background: #161b22;
                border-color: #30363d;
            }

            .nav a {
                background: #1f2428;
                border-color: #30363d;
                color: #c9d1d9;
            }

            .nav a:hover {
                background: #24292f;
            }

            .description {
                color: #9da7b3;
            }

            .quicklinks a {
                background: #161b22;
                border-color: #30363d;
                color: #7fb3ff;
            }

            .quicklinks a:hover {
                background: #1f2630;
            }

            .disclaimer {
                border-color: #30363d;
                color: #6e7681;
            }
        }

    </style>

</head>
