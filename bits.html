<!--    <meta name="referrer" content="strict-origin-when-cross-origin">-->
    <meta name="robots" content="noindex,nofollow">
    <meta name="color-scheme" content="light dark">

    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .header {
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
        }

        .nav {
            display:flex;
            gap:8px;
        }

        .nav a {
            font-size: 13px;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #57606a;
            text-decoration: none;
            font-weight: 600;
        }

        .nav a:hover {
            background: #eef1f4;
        }

        .pick {
            font-size: 28px;
            font-weight: 900;

            background: linear-gradient(180deg, #ff5c93 0%, #ff2d75 60%, #d91b60 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            position: relative;
        }

        /* 아주 은은한 하이라이트 */
        .pick::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;

            background: linear-gradient(
                    180deg,
                    rgba(255,255,255,0.5) 0%,
                    transparent 50%
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            pointer-events: none;
        }

        /* 설명 */
        .description {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        .grid {
            column-count: 2;
            column-gap: 18px;
        }

        .card {
            break-inside: avoid;
            margin-bottom: 18px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            background: #fff;
        }

        .disclaimer {
            margin-top: 40px;
            padding-top: 16px;

            /*border-top: 1px solid #eaeef2;*/

            font-size: 12px;
            color: #8b949e;

            text-align: center;
        }

        /* 모바일 */
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }

            /*.grid {*/
            /*    column-count: 1;*/
            /*}*/
        }

        /* 다크모드 */
        @media (prefers-color-scheme: dark) {

            body {
                background: #0d1117;
                color: #e6edf3;
            }

            .card {
                background: #161b22;
                border-color: #30363d;
            }

            .nav a {
                background: #1f2428;
                border-color: #30363d;
                color: #c9d1d9;
            }

            .nav a:hover {
                background: #24292f;
            }

           .pick {
                color: #ff4d8d;
                text-shadow: 0 0 6px rgba(255, 77, 141, 0.35);
            }

            .description {
                color: #9da7b3;
            }

            .disclaimer {
                border-color: #30363d;
                color: #6e7681;
            }
        }

    </style>

</head>
