<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="utf-8">

<title>X Post Status</title>

<link rel="icon" href="favicon.ico">

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<style>

body{
    font-family:sans-serif;
    margin:40px;
    line-height:1.6;
}

h1{
    font-size:22px;
}

.notice{
    margin-bottom:25px;
    color:#444;
}

#lastUpdate{
    margin-bottom:20px;
    font-size:13px;
    color:#666;
}

table{
    border-collapse:collapse;
    width:100%;
    font-size:13px;
}

th,td{
    border-bottom:1px solid #ddd;
    padding:6px 8px;
}

th{
    text-align:center;
}

td.status{
    text-align:center;
    width:110px;
}

.status-ok{
    color:#2e7d32;
}

.status-deleted{
    color:#c62828;
}

.user{
    background:#f7f7f7;
    font-weight:600;
}

.home-link{
  font-size:13px;
  margin-left:12px;
  padding:5px 10px;
  border-radius:7px;
  border:1px solid #ddd;
  background:#f5f5f5;
  color:#555;
  text-decoration:none;
  vertical-align:middle;
}

.home-link:hover{
  background:#eee;
}

td a::after{
    content:" ↗";
    font-size:12px;
    color:#999;
}

td a{
    color:#1a73e8;
    text-decoration:none;
}

td a:hover{
    text-decoration:underline;
}

</style>

</head>


<body>

<h1>
    X Post Status
    <a href="./index.html" class="home-link">홈으로</a>
</h1>

<div class="notice">
이 페이지는 X 일부 게시물의 현재 상태를 확인하기 위한 페이지입니다.<br>
일부 게시물은 자체적으로 문제가 없지만, 다른 게시글의 맥락을 이해하기 위해 포함되어 있을 수 있습니다.
</div>

<div id="lastUpdate">
Last update: -
(상태 확인은 약 3시간 간격으로 다시 수행됩니다)
</div>

<table id="statusTable">

<thead>
<tr>
<th style="width:160px">User</th>
<th>Tweet</th>
<th style="width:120px">Status</th>
</tr>
</thead>

<tbody>
</tbody>

</table>


<script src="./data/tweets.js"></script>
<script src="./data/username_aliases.js"></script>

<script>

const CACHE_TIME = 3 * 60 * 60 * 1000

const tbody = document.querySelector("#statusTable tbody")

function extractUsername(url){

    const m = url.match(/x\.com\/([^\/]+)/)
    return m ? m[1] : "unknown"

}


function loadCache(){

    const t = localStorage.getItem("tweet_status_time")
    if(!t) return null

    const age = Date.now() - Number(t)

    if(age > CACHE_TIME) return null

    const cache = localStorage.getItem("tweet_status_cache")

    if(!cache) return null

    return JSON.parse(cache)

}


function saveCache(data){

    localStorage.setItem(
        "tweet_status_cache",
        JSON.stringify(data)
    )

    localStorage.setItem(
        "tweet_status_time",
        Date.now()
    )

}


async function checkTweet(url){

    const api =
    "https://publish.twitter.com/oembed?url=" +
    encodeURIComponent(url)

    try{

        const res = await fetch(api)

        if(res.status === 200) return "OK"
        if(res.status === 404) return "DELETED"

        return "UNKNOWN"

    }catch{

        return "UNKNOWN"

    }

}


function groupTweets(){

    const map = {}

    for(const url of tweets){

        const user = extractUsername(url)

        if(!map[user]) map[user] = []

        map[user].push(url)

    }

    return map

}


function renderInitial(){

    const grouped = groupTweets()

    for(const user in grouped){

        const alias =
        username_aliases[user]?.label || user

        const userRow =
        document.createElement("tr")

        userRow.className = "user"

        userRow.innerHTML =
        `<td colspan="3">${alias}</td>`

        tbody.appendChild(userRow)

        for(const url of grouped[user]){

            const tr =
            document.createElement("tr")

            tr.innerHTML =
            `
            <td></td>
            <td>
                <a href="${url}" target="_blank">${url}</a>
            </td>
            <td class="status">checking…</td>
            `

            tbody.appendChild(tr)

        }

    }

}


async function fillStatus(data){

    const rows =
    document.querySelectorAll("tbody tr")

    let i = 0

    for(const row of rows){

        const link =
        row.querySelector("a")

        if(!link) continue

        const url = link.href

        const status = data[url]

        const cell =
        row.querySelector(".status")

        if(status==="OK"){

            cell.innerHTML =
            `<span class="status-ok">OK</span>`

        }

        else if(status==="DELETED"){

            cell.innerHTML =
            `<span class="status-deleted">DELETED</span>`

        }

        else{

            cell.innerHTML = "UNKNOWN"

        }

        await new Promise(r=>setTimeout(r,80))

        i++

    }

}


async function startCheck(){

    renderInitial()

    const cache = loadCache()

    if(cache){

        fillStatus(cache)

        const t =
        new Date(Number(localStorage.getItem("tweet_status_time")))

        document.getElementById("lastUpdate")
        .innerText =
        "Last update: " +
        t.toLocaleString()

        return

    }

    const result = {}

    for(const url of tweets){

        const s = await checkTweet(url)

        result[url] = s

    }

    saveCache(result)

    fillStatus(result)

    const now = new Date()

    document.getElementById("lastUpdate")
    .innerText =
    "Last update: " +
    now.toLocaleString()

}


startCheck()

</script>

</body>

</html>
