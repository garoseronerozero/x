<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Status</title>

<link rel="icon" href="favicon.ico">

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<style>

body{
  font-family:sans-serif;
  margin:40px;
  line-height:1.6;
}

h1{
  margin-bottom:10px;
}

.notice{
  margin-bottom:25px;
  color:#444;
}

.meta{
  margin-bottom:25px;
  font-size:14px;
  color:#666;
}

table{
  border-collapse:collapse;
  width:100%;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
}

th{
  text-align:center;
  background:#f5f5f5;
}

td.status{
  text-align:center;
  font-weight:600;
}

.ok{
  color:green;
}

.deleted{
  color:red;
}

.checking{
  color:#999;
}

</style>

</head>

<body>

<h1>Status</h1>

<div class="notice">
이 페이지는 X 일부 게시물의 현재 공개 상태를 확인하기 위한 기록 페이지입니다.<br>
일부 게시물은 자체적으로 문제가 없지만, 다른 게시글의 인용이나 댓글 등 맥락을 이해하기 위해 포함되어 있을 수 있습니다.
</div>

<div class="meta">
Last updated: <span id="updated"></span> (약 3시간 간격 확인)
</div>

<table>

<thead>

<tr>
<th>User</th>
<th>Tweet</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tweetTable"></tbody>

</table>


<script src="./data/tweets.js"></script>
<script src="./data/username_aliases.js"></script>

<script>

const table = document.getElementById("tweetTable")

function getUsername(url){

  const m = url.match(/x\.com\/([^/]+)/)
  return m ? m[1] : ""

}

function getAlias(username){

  if(username_aliases[username]){
    return username_aliases[username].label
  }

  return username

}

function addRow(url){

  const username = getUsername(url)
  const alias = getAlias(username)

  const row = document.createElement("tr")

  row.innerHTML = `
    <td>${alias}</td>
    <td>
      <a href="${url}" target="_blank">${url}</a>
    </td>
    <td class="status checking">checking...</td>
  `

  table.appendChild(row)

  return row.querySelector(".status")

}

async function checkTweet(url){

  const proxy = "https://cors.isomorphic-git.org/"

  try{

    const res = await fetch(proxy + url)

    if(res.status === 200){
      return "OK"
    }

    return "DELETED"

  }catch{

    return "DELETED"

  }

}

async function runChecks(){

  for(const url of tweets){

    const statusCell = addRow(url)

    const result = await checkTweet(url)

    if(result === "OK"){

      statusCell.textContent = "OK"
      statusCell.classList.remove("checking")
      statusCell.classList.add("ok")

    }else{

      statusCell.textContent = "DELETED"
      statusCell.classList.remove("checking")
      statusCell.classList.add("deleted")

    }

    await new Promise(r => setTimeout(r,1200))

  }

}

function updateTime(){

  const now = new Date()

  const yyyy = now.getFullYear()
  const mm = String(now.getMonth()+1).padStart(2,"0")
  const dd = String(now.getDate()).padStart(2,"0")

  const hh = String(now.getHours()).padStart(2,"0")
  const min = String(now.getMinutes()).padStart(2,"0")

  document.getElementById("updated").textContent =
    `${yyyy}-${mm}-${dd} ${hh}:${min}`

}

updateTime()

runChecks()

</script>

</body>
</html>
