<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Status</title>

    <script src="./data/tweets.js"></script>
    <script src="./data/username_aliases.js"></script>

    <style>

        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 40px auto;
        }

        h1 {
            margin-bottom: 8px;
        }

        #info {
            margin-bottom: 20px;
            color: #555;
            font-size: 14px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            text-align: left;
        }

        th {
            background: #f7f7f7;
        }

        .status {
            font-weight: bold;
        }

        .ok {
            color: #2a7a2a;
        }

        .deleted {
            color: #c33;
        }

        .checking {
            color: #999;
        }

        .user {
            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>Status</h1>

    <div id="info">
        Last check: <span id="lastCheck">-</span>
        <br><br>
        <button id="refreshBtn">Refresh</button>
    </div>

    <table>

        <thead>
            <tr>
                <th>User</th>
                <th>Tweet</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <script>

        const tableBody = document.getElementById("tableBody")
        const lastCheckEl = document.getElementById("lastCheck")
        const refreshBtn = document.getElementById("refreshBtn")

        const AUTO_REFRESH = 3 * 60 * 60 * 1000
        const BUTTON_COOLDOWN = 5 * 60 * 1000

        function formatTime(d) {

            return d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, "0") + "-" +
                String(d.getDate()).padStart(2, "0") + " " +
                String(d.getHours()).padStart(2, "0") + ":" +
                String(d.getMinutes()).padStart(2, "0")

        }

        function groupTweets() {

            const grouped = {}

            for (const url of tweets) {

                const username = url.split("/")[3]

                if (!grouped[username]) {
                    grouped[username] = []
                }

                grouped[username].push(url)

            }

            return grouped

        }

        async function checkTweets() {

            tableBody.innerHTML = ""

            const grouped = groupTweets()

            for (const username in grouped) {

                const urls = grouped[username]

                const alias =
                    username_aliases?.[username]?.label || username

                let first = true
                let rows = []

                for (const url of urls) {

                    const tr = document.createElement("tr")

                    if (first) {

                        tr.innerHTML = `
                            <td class="user" rowspan="${urls.length}">
                                ${alias} (${urls.length})
                            </td>
                            <td>
                                <a href="${url}" target="_blank">link</a>
                            </td>
                            <td class="status checking">CHECKING</td>
                        `

                        first = false

                    } else {

                        tr.innerHTML = `
                            <td>
                                <a href="${url}" target="_blank">link</a>
                            </td>
                            <td class="status checking">CHECKING</td>
                        `

                    }

                    tableBody.appendChild(tr)

                    rows.push({
                        row: tr,
                        url
                    })

                }

                for (const item of rows) {

                    const cell =
                        item.row.children[item.row.children.length - 1]

                    try {

                        const res = await fetch(
                            "https://publish.twitter.com/oembed?url=" + item.url
                        )

                        if (res.ok) {

                            cell.textContent = "OK"
                            cell.className = "status ok"

                        } else {

                            throw "fail"

                        }

                    } catch {

                        cell.textContent = "DELETED"
                        cell.className = "status deleted"

                    }

                }

            }

            lastCheckEl.textContent = formatTime(new Date())

        }

        refreshBtn.onclick = () => {

            checkTweets()

            refreshBtn.disabled = true

            setTimeout(() => {
                refreshBtn.disabled = false
            }, BUTTON_COOLDOWN)

        }

        checkTweets()

        setInterval(checkTweets, AUTO_REFRESH)

    </script>

</body>

</html>
