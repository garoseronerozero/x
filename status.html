<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<title>Tweet Status</title>

<link rel="icon" href="favicon.ico">

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<style>

body{
  font-family: system-ui;
  margin:40px;
}

h1{
  margin-bottom:10px;
}

.description{
  color:#444;
  margin-bottom:30px;
}

.meta{
  margin-bottom:20px;
  font-size:14px;
  color:#666;
}

table{
  border-collapse:collapse;
  font-size: 13px;
  width:100%;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th{
  background:#f5f5f5;
}

.status-ok{
  color:green;
  font-weight:600;
}

.status-deleted{
  color:red;
  font-weight:600;
}

.user-cell{
  font-weight:600;
}

</style>

</head>

<body>

<h1>Status</h1>

<div class="description">
이 페이지는 X 일부 게시물의 현재 공개 상태를 확인하기 위한 기록 페이지입니다.<br>
일부 게시물은 자체적으로 문제가 없지만, 다른 게시글의 맥락을 이해하기 위해 포함되어 있을 수 있습니다.🐾
</div>

<div class="meta">
Last updated: <span id="lastUpdate">checking...</span> (status is checked every 3 hours)
</div>

<table id="statusTable">

<thead>
<tr>
<th>User</th>
<th>Tweet</th>
<th>Status</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<script src="data/tweets.js"></script>
<script src="data/username_aliases.js"></script>

<script>

const CACHE_TIME = 3 * 60 * 60 * 1000

function extractUsername(url){

  const m = url.match(/x\.com\/([^\/]+)\//)
  return m ? m[1] : "unknown"

}

function groupTweets(){

  const map = {}

  tweets.forEach(url=>{

    const user = extractUsername(url)

    if(!map[user]) map[user]=[]

    map[user].push(url)

  })

  return map

}

function formatTime(date){

  return date.toLocaleString()

}

function saveCache(data){

  localStorage.setItem("tweetStatusCache",JSON.stringify(data))

}

function loadCache(){

  const raw = localStorage.getItem("tweetStatusCache")

  if(!raw) return null

  try{
    return JSON.parse(raw)
  }catch{
    return null
  }

}

async function checkTweet(url){

  const api="https://publish.twitter.com/oembed?url="+encodeURIComponent(url)

  try{

    const res=await fetch(api)

    if(res.status===200) return "OK"

    if(res.status===404) return "DELETED"

    return "UNKNOWN"

  }catch{

    return "UNKNOWN"

  }

}

async function render(){

  const tbody=document.querySelector("#statusTable tbody")

  const grouped=groupTweets()

  const cache=loadCache()

  let statusMap={}

  const now=Date.now()

  if(cache && now-cache.time < CACHE_TIME){

    statusMap=cache.data
    document.getElementById("lastUpdate").textContent=formatTime(new Date(cache.time))

  }else{

    document.getElementById("lastUpdate").textContent="checking..."

  }

  const rows=[]

  Object.keys(grouped).forEach(user=>{

    const alias=username_aliases[user]?.label || user

    const urls=grouped[user]

    urls.forEach((url,i)=>{

      const tr=document.createElement("tr")

      if(i===0){

        const tdUser=document.createElement("td")
        tdUser.rowSpan=urls.length
        tdUser.textContent=alias
        tdUser.className="user-cell"
        tr.appendChild(tdUser)

      }

      const tdTweet=document.createElement("td")

      const a=document.createElement("a")
      a.href=url
      a.target="_blank"
      a.textContent=url

      tdTweet.appendChild(a)

      const tdStatus=document.createElement("td")
      tdStatus.textContent="..."

      tr.appendChild(tdTweet)
      tr.appendChild(tdStatus)

      tbody.appendChild(tr)

      rows.push({url,cell:tdStatus})

    })

  })

  if(cache && now-cache.time < CACHE_TIME){

    rows.forEach(r=>{

      const s=statusMap[r.url]

      if(s==="OK"){
        r.cell.textContent="OK"
        r.cell.className="status-ok"
      }
      else if(s==="DELETED"){
        r.cell.textContent="DELETED"
        r.cell.className="status-deleted"
      }
      else{
        r.cell.textContent="UNKNOWN"
      }

    })

    return

  }

  statusMap={}

  for(const r of rows){

    const result=await checkTweet(r.url)

    statusMap[r.url]=result

    if(result==="OK"){
      r.cell.textContent="OK"
      r.cell.className="status-ok"
    }
    else if(result==="DELETED"){
      r.cell.textContent="DELETED"
      r.cell.className="status-deleted"
    }
    else{
      r.cell.textContent="UNKNOWN"
    }

    await new Promise(res=>setTimeout(res,1200))

  }

  const time=Date.now()

  saveCache({
    time:time,
    data:statusMap
  })

  document.getElementById("lastUpdate").textContent=formatTime(new Date(time))

}

render()

</script>

</body>
</html>
