<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Status</title>
  <link rel="icon" href="favicon.ico">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <script src="./data/tweets.js"></script>
  <script src="./data/username_aliases.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
    th { text-align: center; background: #f5f5f5; }
    td.status-cell { text-align: center; }
    .deleted { color: red; font-weight: bold; }
    .ok { color: #333; }
    #lastUpdate { font-size: 13px; color: #555; margin-bottom: 20px; display: block; }
  </style>
</head>
<body>

<h1>Tweet Status</h1>
<span id="lastUpdate"></span>
<table id="statusTable">
  <thead>
    <tr>
      <th>User (OK)</th>
      <th>Tweet & Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const REFRESH_INTERVAL = 3*60*60*1000;

function sleep(ms){return new Promise(r=>setTimeout(r, ms));}
function extractUsername(url){return url.split("/")[3];}
function getAlias(username){return username_aliases[username]?.label || username;}
function cacheKey(url){return "tweet_status_"+url;}
function getCachedStatus(url){const data = localStorage.getItem(cacheKey(url)); if(!data) return null; const parsed = JSON.parse(data); return (Date.now()-parsed.time>REFRESH_INTERVAL)?null:parsed.status;}
function saveStatus(url,status){localStorage.setItem(cacheKey(url),JSON.stringify({status,time:Date.now()}));}
async function checkTweet(url){const cached=getCachedStatus(url); if(cached) return cached; try{const res=await fetch("https://publish.twitter.com/oembed?url="+encodeURIComponent(url)); const status=res.status===404?"DELETED":"OK"; saveStatus(url,status); return status;}catch{return "CHECK_FAIL";}}
function updateTime(){const now=new Date(); const formatted=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0"); document.getElementById("lastUpdate").textContent="Last update: "+formatted;}
function groupTweets(){const groups={};tweets.forEach(url=>{const u=extractUsername(url); if(!groups[u]) groups[u]=[]; groups[u].push(url);}); return groups;}

async function render(){
  const tbody=document.querySelector("#statusTable tbody");
  tbody.innerHTML="";
  const groups=groupTweets();
  for(const username in groups){
    const alias=getAlias(username);
    const group=groups[username];
    const okCount=group.filter(url=>(getCachedStatus(url)||"OK")==="OK").length;

    const tr=document.createElement("tr");
    const userTd=document.createElement("td");
    userTd.rowSpan=group.length;
    userTd.textContent=`${alias} (${okCount})`;
    tr.appendChild(userTd);

    const firstUrl=group[0];
    const firstStatus=await checkTweet(firstUrl);
    const firstTd=document.createElement("td");
    firstTd.innerHTML=`<a href="${firstUrl}" target="_blank">${firstUrl}</a> <span class="${firstStatus==="DELETED"?"deleted":"ok"}">${firstStatus}</span>`;
    firstTd.className="status-cell";
    tr.appendChild(firstTd);
    tbody.appendChild(tr);

    for(let i=1;i<group.length;i++){
      const url=group[i];
      const status=await checkTweet(url);
      const tr2=document.createElement("tr");
      const td=document.createElement("td");
      td.innerHTML=`<a href="${url}" target="_blank">${url}</a> <span class="${status==="DELETED"?"deleted":"ok"}">${status}</span>`;
      td.className="status-cell";
      tr2.appendChild(td);
      tbody.appendChild(tr2);
      await sleep(1200);
    }
  }
  updateTime();
}

render();
setInterval(render, REFRESH_INTERVAL);
</script>

</body>
</html>
