<body id="top">
<h1>
    X Post Status
    <a href="./index.html" class="home-button">홈으로</a>
</h1>

<div class="notice">
    이 페이지는 X 일부 게시물의 현재 상태를 확인하기 위한 페이지입니다.<br>
    일부 게시물은 자체적으로 문제가 없지만, 다른 게시물의 맥락을 이해하기 위해 포함되어 있을 수 있습니다.
</div>

<div id="lastUpdate">
    Last update: -
</div>

<table id="statusTable">
    <thead>
    <tr>
        <th style="width:160px">User</th>
        <th id="tweetHeader">Tweet</th>
        <th style="width:120px">Status</th>
    </tr>
    </thead>

    <tbody>
    </tbody>
</table>

<script src="./data/username_aliases.js"></script>

<script>
    const tbody = document.querySelector("#statusTable tbody")

    /* ---------- 빠른 lookup용 map ---------- */
    const aliasMap = new Map(
        USER_LIST.map(u => [u.id, u.label])
    )

    /* ---------- username 추출 ---------- */
    function extractUsername(url) {
        const m = url.match(/x\.com\/([^\/]+)/)
        return m ? m[1] : "unknown"
    }

    /* ---------- status 스타일 ---------- */
    function getStatusClass(status) {
        if (status === "OK") return "status-ok"
        if (status === "DELETED") return "status-deleted"
        if (status === "RESTRICTED") return "status-error"
        return ""
    }

    /* ---------- group ---------- */
    function groupByUser(data) {

        const map = new Map()

        for (const [url, status] of Object.entries(data)) {

            const user = extractUsername(url).trim()

            if (!map.has(user)) {
                map.set(user, [])
            }

            map.get(user).push({url, status})
        }

        return map
    }

    /* ---------- render ---------- */
    function renderGrouped(groupedMap) {

        tbody.innerHTML = ""

        const rendered = new Set()

        // ✅ 1. USER_LIST 순서 그대로 렌더 (100% 보장)
        for (const {id} of USER_LIST) {

            if (!groupedMap.has(id)) continue

            renderUserBlock(id, groupedMap.get(id))
            rendered.add(id)
        }

        // ✅ 2. 나머지 user 뒤에
        const extraUsers = []

        for (const user of groupedMap.keys()) {
            if (!rendered.has(user)) {
                extraUsers.push(user)
            }
        }

        extraUsers.sort()

        for (const user of extraUsers) {
            renderUserBlock(user, groupedMap.get(user))
        }
    }

    /* ---------- render block ---------- */
    function renderUserBlock(user, tweets) {

        const alias = aliasMap.get(user) || user

        const userRow = document.createElement("tr")
        userRow.className = "user"
        userRow.innerHTML = `<td colspan="3">${alias}</td>`
        tbody.appendChild(userRow)

        for (const tweet of tweets) {

            const tr = document.createElement("tr")

            tr.innerHTML = `
<td></td>
<td>
<a href="${tweet.url}" target="_blank" rel="noopener noreferrer">
${tweet.url}
</a>
</td>
<td class="status ${getStatusClass(tweet.status)}">
${tweet.status}
</td>
`

            tbody.appendChild(tr)
        }
    }

    /* ---------- stats ---------- */
    function updateTweetHeader(data) {

        const values = Object.values(data)

        const total = values.length

        const deleted = values.filter(v => v === "DELETED").length
        const restricted = values.filter(v => v === "RESTRICTED").length

        const error = deleted + restricted

        const remainingRate =
            total > 0
                ? ((total - error) / total * 100).toFixed(1)
                : 0

        document.getElementById("tweetHeader").innerHTML =
            `Tweet (${total} total ·
<span title="삭제 또는 제한">${error} unavailable</span> ·
<span title="잔존율">${remainingRate}%)</span>`
    }

    /* ---------- load ---------- */
    async function loadAndRender() {

        try {

            const res = await fetch("./data/status.json", {cache: "no-store"})
            const json = await res.json()

            const groupedMap = groupByUser(json.data)

            renderGrouped(groupedMap)

            updateTweetHeader(json.data)

            document.getElementById("lastUpdate").innerText =
                "Last update: " + json.lastUpdate

        } catch (e) {

            document.getElementById("lastUpdate").innerText =
                "Status load failed"
        }
    }

    loadAndRender()
</script>


<a href="#top" id="backToTop">↑</a>
<script>
    const btn = document.getElementById("backToTop")

    window.addEventListener("scroll", () => {

        if (window.scrollY > 400) {
            btn.style.opacity = "1"
            btn.style.pointerEvents = "auto"

        } else {
            btn.style.opacity = "0"
            btn.style.pointerEvents = "none"
        }
    })
</script>
</body>
<div class="disclaimer">

</div>
</html>
