<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="utf-8">

    <title>X Post Status</title>

    <link rel="icon" href="favicon.ico">

    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex,nofollow">

    <style>

        body{
            font-family:sans-serif;
            margin:40px;
            line-height:1.6;
        }

        h1{
            font-size:22px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .notice{
            font-size:13px;
            margin-bottom:16px;
            color:#555;
        }

        #lastUpdate{
            margin-bottom:20px;
            font-size:13px;
            color:#666;
        }

        table{
            border-collapse:collapse;
            width:100%;
            font-size:13px;
        }

        th,td{
            border-bottom:1px solid #ddd;
            padding:6px 8px;
        }

        th{
            text-align:center;
        }

        td.status{
            text-align:center;
            width:110px;
        }

        .status-ok{
            color:#2e7d32;
        }

        .status-deleted{
            color:#c62828;
        }

        .user{
            background:#f7f7f7;
            font-weight:600;
        }

        .home-link{
            font-size:13px;
            padding:5px 10px;
            border-radius:7px;
            border:1px solid #ddd;
            background:#f5f5f5;
            color:#555;
            text-decoration:none;
        }

        .home-link:hover{
            background:#eee;
        }

        td a{
            color:#1a73e8;
            text-decoration:none;
        }

        td a:hover{
            text-decoration:underline;
        }

    </style>

</head>


<body>

<h1>
    X Post Status
    <a href="./index.html" class="home-link">홈으로</a>
</h1>

<div class="notice">
    이 페이지는 X 일부 게시물의 현재 상태를 확인하기 위한 페이지입니다.<br>
    일부 게시물은 자체적으로 문제가 없지만, 다른 게시글의 맥락을 이해하기 위해 포함되어 있을 수 있습니다.
</div>

<div id="lastUpdate">
    Last update: -
</div>

<table id="statusTable">

    <thead>
    <tr>
        <th style="width:160px">User</th>
        <th>Tweet</th>
        <th style="width:120px">Status</th>
    </tr>
    </thead>

    <tbody>
    </tbody>

</table>


<script src="./data/tweets.js"></script>
<script src="./data/username_aliases.js"></script>

<script>

    const tbody = document.querySelector("#statusTable tbody")

    function extractUsername(url){

        const m = url.match(/x\.com\/([^\/]+)/)
        return m ? m[1] : "unknown"

    }

    function groupTweets(){

        const map = {}

        for(const url of tweets){

            const user = extractUsername(url)

            if(!map[user]) map[user] = []
            map[user].push(url)

        }

        return map

    }

    function renderInitial(){

        const grouped = groupTweets()

        for(const user in grouped){

            const alias =
                username_aliases[user]?.label || user

            const userRow =
                document.createElement("tr")

            userRow.className = "user"

            userRow.innerHTML =
                `<td colspan="3">${alias}</td>`

            tbody.appendChild(userRow)

            for(const url of grouped[user]){

                const tr =
                    document.createElement("tr")

                tr.innerHTML =
                    `
            <td></td>
            <td>
                <a href="${url}" target="_blank">${url}</a>
            </td>
            <td class="status">checking…</td>
            `

                tbody.appendChild(tr)

            }

        }

    }

    function applyStatus(data){

        const rows =
            document.querySelectorAll("tbody tr")

        for(const row of rows){

            const link =
                row.querySelector("a")

            if(!link) continue

            const url =
                link.getAttribute("href")

            const status =
                data[url]

            const cell =
                row.querySelector(".status")

            if(status==="OK"){

                cell.innerHTML =
                    `<span class="status-ok">OK</span>`

            }

            else if(status==="DELETED"){

                cell.innerHTML =
                    `<span class="status-deleted">DELETED</span>`

            }

            else if(status==="PROTECTED"){

                cell.textContent = "PROTECTED"

            }

            else{

                cell.textContent = "UNKNOWN"

            }

        }

    }

    async function loadStatus(){

        try{

            const res =
                await fetch("./data/status.json")

            const json =
                await res.json()

            applyStatus(json.data)

            document.getElementById("lastUpdate")
                .innerText =
                "Last update: " + json.lastUpdate

        }

        catch(e){

            document.getElementById("lastUpdate")
                .innerText =
                "Status load failed"

        }

    }

    function start(){

        renderInitial()
        loadStatus()

    }

    start()

</script>

</body>

</html>
