<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Status</title>

<link rel="icon" href="favicon.ico">
  
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">

<style>

body{
font-family: system-ui, sans-serif;
margin:40px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#f5f5f5;
text-align:left;
}

.deleted{
color:#d33;
font-weight:bold;
}

.username{
font-weight:bold;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:6px 12px;
font-size:13px;
cursor:pointer;
}

.meta{
font-size:13px;
color:#666;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
<h2>Tweet Status</h2>
<button id="refreshBtn">Refresh</button>
</div>

<div class="meta">
Last updated: <span id="updated"></span>
</div>

<table>

<thead>
<tr>
<th>User</th>
<th>Tweet</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script src="./data/tweets.js"></script>
<script src="./data/username_aliases.js"></script>

<script>

const REFRESH_INTERVAL = 3 * 60 * 60 * 1000
const REFRESH_LOCK = 5 * 60 * 1000

let lastManualRefresh = 0

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

function getCachedStatus(url){

const key = "tweet_status_"+url
const cached = localStorage.getItem(key)

if(!cached) return null

const data = JSON.parse(cached)

if(Date.now() - data.time > REFRESH_INTERVAL){
return null
}

return data.status

}

function saveStatus(url,status){

localStorage.setItem(
"tweet_status_"+url,
JSON.stringify({
status:status,
time:Date.now()
})
)

}

function getUsername(url){

const m = url.match(/x\.com\/([^\/]+)\//)

return m ? m[1] : "unknown"

}

async function checkTweet(url){

try{

const res = await fetch(url,{method:"HEAD",mode:"no-cors"})

return "OK"

}catch(e){

return "DELETED"

}

}

async function render(){

const body = document.getElementById("tableBody")

body.innerHTML=""

for(const url of tweets){

const username = getUsername(url)

const alias = username_aliases[username]?.label || username

let status = getCachedStatus(url)

if(!status){

await sleep(800)

status = await checkTweet(url)

saveStatus(url,status)

}

const tr = document.createElement("tr")

const tdUser = document.createElement("td")
tdUser.className="username"
tdUser.textContent=alias

const tdUrl = document.createElement("td")

const a = document.createElement("a")
a.href=url
a.textContent=url
a.target="_blank"

tdUrl.appendChild(a)

const tdStatus = document.createElement("td")
tdStatus.textContent=status

if(status==="DELETED"){
tdStatus.className="deleted"
}

tr.appendChild(tdUser)
tr.appendChild(tdUrl)
tr.appendChild(tdStatus)

body.appendChild(tr)

}

document.getElementById("updated").textContent =
new Date().toLocaleString()

}

async function manualRefresh(){

const now = Date.now()

if(now-lastManualRefresh < REFRESH_LOCK){

alert("5분 후 다시 시도하세요.")

return

}

lastManualRefresh = now

document.getElementById("refreshBtn").disabled=true

await render()

setTimeout(()=>{
document.getElementById("refreshBtn").disabled=false
},REFRESH_LOCK)

}

document.getElementById("refreshBtn").onclick=manualRefresh

render()

setInterval(render,REFRESH_INTERVAL)

</script>

</body>
</html>
