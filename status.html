<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Status</title>

  <link rel="icon" href="favicon.ico">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">

  <script src="./data/tweets.js"></script>
  <script src="./data/user_aliases.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 40px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 5px;
    }

    p.description {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 30px;
    }

    th,
    td {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f5f5f5;
      text-align: center;
    }

    td.status-cell {
      text-align: center;
    }

    .deleted {
      color: red;
      font-weight: bold;
    }

    .ok {
      color: #333;
    }

    .group-title {
      margin-top: 40px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Tweet Status</h1>
  <p class="description">
    이 페이지는 X 일부 게시물의 현재 공개 상태를 확인하기 위한 기록 페이지입니다.<br>
    일부 게시물은 자체적으로 문제가 없지만, 다른 게시글의 인용이나 댓글 등 맥락을 이해하기 위해 포함되어 있습니다. 🐾
  </p>

  <div class="controls">
    <button id="refreshBtn">Refresh</button>
    <span id="lastUpdate"></span>
  </div>

  <div id="content"></div>

  <script>
    const REFRESH_INTERVAL = 3 * 60 * 60 * 1000;
    const MANUAL_LOCK = 5 * 60 * 1000;
    let lastManualRefresh = 0;

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function extractUsername(url) {
      const parts = url.split("/");
      return parts[3];
    }

    function getAlias(username) {
      if (username_aliases && username_aliases[username]) {
        return username_aliases[username].label;
      }
      return username;
    }

    function cacheKey(url) {
      return "tweet_status_" + url;
    }

    function getCachedStatus(url) {
      const data = localStorage.getItem(cacheKey(url));
      if (!data) return null;
      const parsed = JSON.parse(data);
      if (Date.now() - parsed.time > REFRESH_INTERVAL) return null;
      return parsed.status;
    }

    function saveStatus(url, status) {
      localStorage.setItem(cacheKey(url), JSON.stringify({ status, time: Date.now() }));
    }

    async function checkTweet(url) {
      const cached = getCachedStatus(url);
      if (cached) return cached;

      const oembed = "https://publish.twitter.com/oembed?url=" + encodeURIComponent(url);

      try {
        const res = await fetch(oembed);
        const status = res.status === 404 ? "DELETED" : "OK";
        saveStatus(url, status);
        return status;
      } catch {
        return "CHECK_FAIL";
      }
    }

    function groupTweets() {
      const groups = {};
      tweets.forEach(url => {
        const username = extractUsername(url);
        if (!groups[username]) groups[username] = [];
        groups[username].push(url);
      });
      return groups;
    }

    function updateTime() {
      const now = new Date();
      const formatted = now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");
      document.getElementById("lastUpdate").textContent = "Last update: " + formatted;
    }

    async function render() {
      const content = document.getElementById("content");
      content.innerHTML = "";

      const groups = groupTweets();

      for (const username in groups) {
        const alias = getAlias(username);

        // OK 게시물 수 계산
        let okCount = 0;
        for (const url of groups[username]) {
          const status = getCachedStatus(url) || "OK";
          if (status === "OK") okCount++;
        }

        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = `${alias} (${username}) – ${okCount}`;
        content.appendChild(title);

        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>Tweet</th><th>Status</th></tr></thead>";
        const tbody = document.createElement("tbody");
        table.appendChild(tbody);

        for (const url of groups[username]) {
          await sleep(1200);
          const status = await checkTweet(url);

          const tr = document.createElement("tr");

          const linkCell = document.createElement("td");
          const link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          link.textContent = url;
          linkCell.appendChild(link);

          const statusCell = document.createElement("td");
          statusCell.className = "status-cell";
          if (status === "DELETED") {
            statusCell.innerHTML = "<span class='deleted'>DELETED</span>";
          } else {
            statusCell.innerHTML = "<span class='ok'>OK</span>";
          }

          tr.appendChild(linkCell);
          tr.appendChild(statusCell);
          tbody.appendChild(tr);
        }

        content.appendChild(table);
      }

      updateTime();
    }

    function refresh() {
      const now = Date.now();
      if (now - lastManualRefresh < MANUAL_LOCK) {
        alert("5분 후 다시 시도하세요.");
        return;
      }

      lastManualRefresh = now;
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      setTimeout(() => { btn.disabled = false; }, MANUAL_LOCK);

      render();
    }

    document.getElementById("refreshBtn").addEventListener("click", refresh);

    render();
    setInterval(render, REFRESH_INTERVAL);
  </script>

</body>
</html>
